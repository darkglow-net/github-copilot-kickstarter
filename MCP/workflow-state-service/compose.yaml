services:
  workflow-state-service:
    build: .
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - wss-data:/data
    environment:
      - PORT=3001
      - LOG_LEVEL=info
      - ORPHAN_TTL_DAYS=7
    healthcheck:
      test: wget -qO- http://127.0.0.1:3001/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  wss-data:
    driver: local
